name: cicd

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
     - name: Clone the code
       run: echo "cloning the the code"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: build the the code 
        run: echo "code is build"
      
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: test the code
        run: echo "code is tested"


  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: deploy the code
        run: echo "deployed the code"
        
